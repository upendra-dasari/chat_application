<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp – Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="chat-page">

  <div class="chat-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="app-brand">
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill="url(#grad2)"/>
            <path d="M10 14h20M10 20h14M10 26h18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
          <span>ChatApp</span>
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-label">Online Users</h3>
        <ul class="user-list" id="userList">
          <!-- populated by JS -->
        </ul>
      </div>

      <div class="sidebar-footer">
        <div class="current-user">
          <div class="avatar" id="myAvatar"></div>
          <span id="myUsername">...</span>
        </div>
        <button class="logout-btn" id="logoutBtn" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main">
      <header class="chat-header">
        <div>
          <h2>Global Chat</h2>
          <p class="chat-subtitle" id="onlineCount">0 online</p>
        </div>
      </header>

      <div class="messages-container" id="messagesContainer">
        <div class="messages-inner" id="messages">
          <!-- messages rendered here -->
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator"></div>

      <div class="message-input-area">
        <form class="message-form" id="messageForm" onsubmit="sendMessage(event)">
          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
            autocomplete="off"
            maxlength="500"
          />
          <button type="submit" class="send-btn" id="sendBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </main>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
