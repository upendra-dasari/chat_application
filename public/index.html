<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="url(#grad)"/>
          <path d="M10 14h20M10 20h14M10 26h18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>ChatApp</h1>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required />
        </div>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span>Login</span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username (3–20 chars)" minlength="3" maxlength="20" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Choose a password (min 6 chars)" minlength="6" required />
        </div>
        <div class="error-msg" id="registerError"></div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span>Create Account</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/api/me').then(r => {
      if (r.ok) window.location.href = '/chat.html';
    });

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
      document.getElementById('registerForm').classList.toggle('hidden', isLogin);
      document.getElementById('loginTab').classList.toggle('active', isLogin);
      document.getElementById('registerTab').classList.toggle('active', !isLogin);
      document.getElementById('loginError').textContent = '';
      document.getElementById('registerError').textContent = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/chat.html';
        } else {
          errEl.textContent = data.error;
          btn.disabled = false;
          btn.innerHTML = '<span>Login</span>';
        }
      } catch {
        errEl.textContent = 'Connection error. Try again.';
        btn.disabled = false;
        btn.innerHTML = '<span>Login</span>';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errEl = document.getElementById('registerError');
      errEl.textContent = '';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/chat.html';
        } else {
          errEl.textContent = data.error;
          btn.disabled = false;
          btn.innerHTML = '<span>Create Account</span>';
        }
      } catch {
        errEl.textContent = 'Connection error. Try again.';
        btn.disabled = false;
        btn.innerHTML = '<span>Create Account</span>';
      }
    }
  </script>
</body>
</html>
